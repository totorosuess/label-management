<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>标签管理平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-shape shape-a"></div>
    <div class="bg-shape shape-b"></div>

    <header class="app-header">
      <div class="brand">
        <div class="logo">LM</div>
        <div>
          <div class="title">标签管理平台</div>
          <div class="subtitle">上传你的标签表，快速浏览与检索</div>
        </div>
      </div>
      <div class="stats" id="stats">
        <div class="stat">
          <div class="stat-label">标签总数</div>
          <div class="stat-value" id="stat-total">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">业务线</div>
          <div class="stat-value" id="stat-line">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">层级标签</div>
          <div class="stat-value" id="stat-levels">0</div>
        </div>
      </div>
    </header>

    <main class="app-main">
      <section class="panel upload-panel">
        <div class="panel-title">上传标签 CSV</div>
        <div class="upload-area" id="dropzone">
          <div class="upload-copy">
            <div class="upload-title">拖拽 CSV 到这里</div>
            <div class="upload-desc">或点击选择文件</div>
          </div>
          <input type="file" id="fileInput" accept=".csv,text/csv" />
        </div>
        <div class="upload-actions">
          <button class="btn" id="loadSample">加载示例数据</button>
          <button class="btn ghost" id="clearData">清空</button>
        </div>
        <div class="hint">
          支持列：`experience_labels_name`, `experience_label1_name`, `experience_label2_name`,
          `experience_label3_name`, `产品业务线`, `体验标签对应的用户表现型`
        </div>
      </section>

      <section class="panel filter-panel">
        <div class="panel-title">筛选与搜索</div>
        <div class="filters">
          <div class="field">
            <label for="searchInput">关键词</label>
            <input id="searchInput" type="text" placeholder="输入标签或描述" />
          </div>
          <div class="field">
            <label for="lineFilter">业务线</label>
            <select id="lineFilter">
              <option value="">全部</option>
            </select>
          </div>
          <div class="field">
            <label for="level1Filter">一级标签</label>
            <select id="level1Filter">
              <option value="">全部</option>
            </select>
          </div>
          <div class="field">
            <label for="level2Filter">二级标签</label>
            <select id="level2Filter">
              <option value="">全部</option>
            </select>
          </div>
        </div>
      </section>

      <section class="panel results-panel">
        <div class="panel-title">标签展示</div>
        <div class="results-meta" id="resultsMeta">暂无数据</div>
        <div class="card-grid" id="cardGrid"></div>
      </section>
    </main>

    <template id="cardTemplate">
      <article class="label-card">
        <div class="card-header">
          <div class="card-title"></div>
          <div class="pill"></div>
        </div>
        <div class="card-levels"></div>
        <div class="card-desc"></div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
