<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>标签管理平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-shape shape-a"></div>
    <div class="bg-shape shape-b"></div>

    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="logo">LM</div>
          <div>
            <div class="title">标签管理平台</div>
            <div class="subtitle">上传、编辑与展示你的标签</div>
          </div>
        </div>

        <nav class="menu">
          <button class="menu-item active" data-view="manage">
            <span>标签管理</span>
            <small>上传与编辑</small>
          </button>
          <button class="menu-item" data-view="display">
            <span>标签展示</span>
            <small>筛选与浏览</small>
          </button>
        </nav>

        <div class="sidebar-footer">
          <div class="stat">
            <div class="stat-label">标签总数</div>
            <div class="stat-value" id="stat-total">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">业务线</div>
            <div class="stat-value" id="stat-line">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">层级标签</div>
            <div class="stat-value" id="stat-levels">0</div>
          </div>
        </div>
      </aside>

      <main class="main-content">
        <header class="page-header">
          <div>
            <h1 id="pageTitle">标签管理</h1>
            <p id="pageDesc">上传 CSV 并在表格里直接编辑、删除或新增标签。</p>
          </div>
          <div class="header-actions">
            <button class="btn ghost" id="exportCsv">导出 CSV</button>
          </div>
        </header>

        <section class="page" id="page-manage">
          <section class="panel form-panel">
            <div class="panel-title">新增标签</div>
            <form id="labelForm" class="form-grid">
              <div class="field">
                <label for="formLine">业务线</label>
                <input id="formLine" type="text" placeholder="产品业务线" />
              </div>
              <div class="field">
                <label for="formLevel1">一级标签</label>
                <input id="formLevel1" type="text" placeholder="experience_label1_name" />
              </div>
              <div class="field">
                <label for="formLevel2">二级标签</label>
                <input id="formLevel2" type="text" placeholder="experience_label2_name" />
              </div>
              <div class="field">
                <label for="formLevel3">三级标签</label>
                <input id="formLevel3" type="text" placeholder="experience_label3_name" />
              </div>
              <div class="field full">
                <label for="formDesc">用户表现型描述</label>
                <textarea id="formDesc" rows="1" placeholder="体验标签对应的用户表现型"></textarea>
              </div>
              <div class="form-footer">
                <div class="form-actions">
                  <button class="btn" type="submit" id="saveLabel">保存</button>
                  <button class="btn ghost" type="button" id="resetForm">重置</button>
                </div>
                <div class="upload-actions">
                  <label class="btn" for="fileInput">批量上传</label>
                  <input type="file" id="fileInput" accept=".csv,text/csv" />
                  <a
                    class="btn ghost"
                    id="downloadTemplate"
                    href="/Users/bytedance/Desktop/batch upload template.csv"
                    download
                    >下载CSV模板</a
                  >
                </div>
              </div>
            </form>
          </section>

          <section class="panel table-panel">
            <div class="panel-title">标签列表</div>
            <div class="table-actions">
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th><input type="checkbox" id="selectAll" /></th>
                    <th>业务线</th>
                    <th>一级</th>
                    <th>二级</th>
                    <th>三级</th>
                    <th>描述</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="manageTableBody"></tbody>
              </table>
            </div>
            <div class="table-footer">
              <div class="pager" id="pager">
                <button class="btn ghost" id="prevPage">上一页</button>
                <span class="pager-info" id="pageInfo">第 1 / 1 页</span>
                <button class="btn ghost" id="nextPage">下一页</button>
              </div>
              <div class="page-size">
                <label for="pageSizeSelect">每页行数</label>
                <select id="pageSizeSelect">
                  <option value="20">20</option>
                  <option value="50">50</option>
                  <option value="100">100</option>
                </select>
                <span class="results-meta" id="manageMeta">暂无数据</span>
              </div>
            </div>
          </section>
        </section>

        <section class="page hidden" id="page-display">
          <section class="panel filter-panel">
            <div class="panel-title">筛选与搜索</div>
            <div class="filters">
              <div class="field">
                <label for="searchInput">关键词</label>
                <input id="searchInput" type="text" placeholder="输入标签或描述" />
              </div>
              <div class="field">
                <label for="lineFilter">业务线</label>
                <select id="lineFilter">
                  <option value="">全部</option>
                </select>
              </div>
              <div class="field">
                <label for="level1Filter">一级标签</label>
                <select id="level1Filter">
                  <option value="">全部</option>
                </select>
              </div>
              <div class="field">
                <label for="level2Filter">二级标签</label>
                <select id="level2Filter">
                  <option value="">全部</option>
                </select>
              </div>
            </div>
          </section>

          <section class="panel results-panel">
            <div class="panel-title">标签展示</div>
            <div class="results-meta" id="resultsMeta">暂无数据</div>
            <div class="card-grid" id="cardGrid"></div>
          </section>
        </section>
      </main>
    </div>

    <template id="cardTemplate">
      <article class="label-card">
        <div class="card-header">
          <div class="card-title"></div>
          <div class="pill"></div>
        </div>
        <div class="card-levels"></div>
        <div class="card-desc"></div>
      </article>
    </template>

    <div class="modal hidden" id="confirmModal">
      <div class="modal-backdrop"></div>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
        <div class="modal-title" id="confirmTitle">确认操作</div>
        <div class="modal-body" id="confirmMessage">确定要继续吗？</div>
        <div class="modal-actions">
          <button class="btn ghost" id="confirmCancel">取消</button>
          <button class="btn" id="confirmOk">确认</button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
